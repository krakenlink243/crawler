spring.application.name=worker

# Server Config
server.port=${APP_PORT:8080}
spring.cloud.aws.region.static=ap-southeast-2
spring.config.import=aws-secretsmanager:ENV_crawler

# Database Config (Lấy từ biến môi trường)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.io.awspring.cloud.secretsmanager=TRACE
logging.level.software.amazon.awssdk=DEBUG