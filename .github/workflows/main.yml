name: Deploy to AWS ECR (OIDC)

on:
  push:
    branches: [ "main" ] # Chỉ chạy khi push vào nhánh main

# QUAN TRỌNG: Cấp quyền để lấy Token từ AWS qua OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Bước 1: Kết nối AWS bằng OIDC (Thay thế Access Key)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::510728439377:role/gh-action-crawler-role # THAY ARN CỦA BẠN VÀO ĐÂY
        aws-region: ap-southeast-2

    # Bước 2: Đăng nhập vào kho ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Bước 3: Build & Push con WORKER
    - name: Build, tag, and push Worker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: worker # Tên repo bạn tạo trên ECR
        IMAGE_TAG: latest
      run: |
        docker build -f ./worker/dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./worker
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Bước 4: Build & Push con SEEDER
    - name: Build, tag, and push Seeder image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: producer # Tên repo bạn tạo trên ECR
        IMAGE_TAG: latest
      run: |
        docker build -f ./producer/dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./producer
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG